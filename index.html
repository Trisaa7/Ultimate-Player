<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>

  <meta property="og:description" id="metaOgDesc" content="Choisis le meilleur joueur pour chaque attribut - jeu de tete, dribble, vitesse, finition... Genere ta carte et partage-la !"/>

  <title>ULTIMATE PLAYER</title>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%230a0f0a' stroke='%237ed321' stroke-width='1.5'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-size='18'%3E⚽%3C/text%3E%3C/svg%3E"/>
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230a0f0a'/%3E%3Ctext x='90' y='120' text-anchor='middle' font-size='100'%3E⚽%3C/text%3E%3C/svg%3E"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" media="print" onload="this.media='all'"/>
  <noscript><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet"/></noscript>

  <style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0f0a;--panel:#0d1410;--panel2:#111a14;
  --gold:#f5c842;--gold2:#d4a017;
  --green:#00e676;--lime:#7ed321;--emerald:#00c853;
  --white:#f0f5f0;--muted:#4a6050;--border:rgba(255,255,255,0.08);--text:#e8f0e8;
  --fs-xs:0.72rem;--fs-sm:0.88rem;--fs-md:1rem;--fs-xl:1.3rem;--fs-2xl:1.6rem;
  --radius-sm:8px;--radius-md:14px;--radius-lg:20px;
  --ease-out:cubic-bezier(.4,0,.2,1);
  --sil-glow:0;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;overflow-x:hidden;min-height:100vh}

/* ── HEADER ── */
.hd{position:relative;z-index:2;background:linear-gradient(180deg,#061008 0%,var(--bg) 100%);text-align:center;padding:28px 24px 24px}
.hd::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 50% 0%,rgba(0,200,83,.1),transparent);pointer-events:none}
.hd::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(126,211,33,.15),transparent)}
.hd-tag{display:inline-flex;align-items:center;gap:7px;font-size:var(--fs-xs);letter-spacing:.28em;text-transform:uppercase;color:var(--lime);border:1px solid rgba(126,211,33,.25);padding:5px 16px;border-radius:99px;margin-bottom:16px;background:rgba(126,211,33,.05);box-shadow:0 0 20px rgba(126,211,33,.06)}
.hd h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.8rem,9vw,5.5rem);letter-spacing:.08em;color:var(--lime);background:linear-gradient(135deg,#fff 25%,var(--lime) 60%,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.hd-desc{font-size:var(--fs-sm);color:var(--muted);margin-top:10px;font-style:italic;letter-spacing:.04em;max-width:520px;margin-left:auto;margin-right:auto;line-height:1.6}
.lang-switcher{position:absolute;top:16px;right:20px;display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;z-index:10}
.lang-btn{background:rgba(255,255,255,.04);border:1px solid var(--border);padding:6px 10px;border-radius:8px;cursor:pointer;transition:border-color .15s,background .15s,transform .15s;line-height:0;display:inline-flex;align-items:center;justify-content:center}
.lang-btn img{display:block;border-radius:2px}
.lang-btn:hover{border-color:rgba(126,211,33,.4);transform:scale(1.1)}
.lang-btn.active{border-color:var(--lime);background:rgba(126,211,33,.1);transform:scale(1.05)}

/* ── LAYOUT ── */
.wrap{position:relative;z-index:1;max-width:1280px;margin:0 auto;display:flex;flex-direction:column;min-height:80vh}

/* ── SILHOUETTE AREA ── */
.silhouette-area{padding:24px 20px 20px;display:flex;flex-direction:column;align-items:center;background:linear-gradient(180deg,#071009 0%,#0b1a0d 100%);position:relative;overflow:visible;gap:20px}
.silhouette-area::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 70% at 50% 55%,rgba(26,107,42,.22),transparent 70%);pointer-events:none}
.player-stage{position:relative;width:240px;height:490px;flex-shrink:0;z-index:2}
.psv{position:absolute;inset:0;width:100%;height:100%}
#hsContainer{position:absolute;inset:0}

/* ── SILHOUETTE GLOW EFFECT ── */
#silBody [data-part]{transition:stroke .5s ease, fill .5s ease, filter .5s ease}
.sil-glow-overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:0;transition:opacity .6s ease;background:radial-gradient(ellipse 50% 60% at 50% 45%,rgba(126,211,33,.12),transparent 70%)}
.player-stage[data-progress="low"] .sil-glow-overlay{opacity:0}
.player-stage[data-progress="mid"] .sil-glow-overlay{opacity:.4}
.player-stage[data-progress="high"] .sil-glow-overlay{opacity:.7}
.player-stage[data-progress="done"] .sil-glow-overlay{opacity:1}

/* ── HOTSPOTS ── */
.hs{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:pointer;z-index:10;touch-action:manipulation;transform:translate(-50%,-50%);transition:transform .18s var(--ease-out)}
.hs:hover{transform:translate(-50%,-50%) scale(1.1)}
.hs-btn{width:52px;height:52px;border-radius:50%;background:rgba(6,16,8,.92);border:1.5px solid rgba(126,211,33,.35);display:flex;align-items:center;justify-content:center;font-size:1.7rem;transition:border-color .2s,background .2s,box-shadow .2s;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);box-shadow:0 2px 10px rgba(0,0,0,.5)}
.hs:hover .hs-btn,.hs.sel .hs-btn{border-color:var(--lime);background:rgba(126,211,33,.16);box-shadow:0 0 18px rgba(126,211,33,.35)}
.hs-txt{font-size:.95rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:3px;white-space:nowrap;background:rgba(6,16,8,.9);padding:2px 8px;border-radius:3px;max-width:130px;text-align:center;overflow:hidden;text-overflow:ellipsis;transition:color .18s}
.hs.sel .hs-txt{color:var(--lime)}
.hs-name{font-size:.92rem;font-weight:700;color:var(--gold);margin-top:1px;white-space:nowrap;background:rgba(6,16,8,.9);padding:2px 8px;border-radius:3px;max-width:130px;overflow:hidden;text-overflow:ellipsis;text-align:center}

/* ── PANEL ── */
.panel{background:var(--panel);display:flex;flex-direction:column;flex:1}
.panel-hd{padding:24px 22px 18px;border-bottom:1px solid var(--border)}
.panel-hd h2{font-family:'Bebas Neue',sans-serif;font-size:var(--fs-2xl);letter-spacing:.06em;color:var(--white);line-height:1}
.panel-hd-top{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:4px}
.prog-track{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;margin:10px 0 8px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--emerald),var(--lime));border-radius:3px;transition:width .45s var(--ease-out)}
.prog-pct{font-family:'Bebas Neue',sans-serif;font-size:var(--fs-2xl);color:var(--lime);letter-spacing:.04em;flex-shrink:0;line-height:1;transition:color .3s}
.panel-hd p{font-size:var(--fs-sm);color:var(--muted);margin-top:2px}
.attr-scroll{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.attr-scroll::-webkit-scrollbar{width:3px}
.attr-scroll::-webkit-scrollbar-track{background:transparent}
.attr-scroll::-webkit-scrollbar-thumb{background:rgba(126,211,33,.25);border-radius:2px}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ai{background:var(--panel2);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:border-color .15s,background .15s,transform .15s,box-shadow .15s;min-height:68px;touch-action:manipulation}
.ai.animate-in{animation:fadeSlideIn .3s var(--ease-out) both}
.ai:active{background:rgba(126,211,33,.08);border-color:rgba(126,211,33,.4)}
.ai:hover{border-color:rgba(126,211,33,.35);background:rgba(126,211,33,.05);transform:translateX(2px)}
.ai.done{border-color:rgba(0,200,83,.3);background:rgba(0,200,83,.03)}
.ai-icon{font-size:2rem;flex-shrink:0;width:40px;text-align:center;line-height:1}
.ai-body{flex:1;min-width:0}
.ai-name{font-size:1.1rem;font-weight:700;color:var(--text);line-height:1.2;letter-spacing:.02em}
.ai-pick{font-size:1rem;color:var(--green);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s}
.ai-pick.empty{color:var(--muted);font-weight:400;font-style:italic}
.ai-check{color:var(--green);font-size:1.4rem;opacity:0;flex-shrink:0;font-weight:700;transition:opacity .2s}
.ai.done .ai-check{opacity:1}
.panel-actions{padding:16px 16px 20px;border-top:1px solid var(--border)}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--panel);border:1px solid rgba(126,211,33,.2);border-radius:22px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;transform:translateY(24px) scale(.97);transition:transform .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 32px 90px rgba(0,0,0,.75),0 0 0 1px rgba(126,211,33,.06)}
.overlay.open .modal{transform:translateY(0) scale(1)}
.modal-top{padding:26px 26px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
.modal-attr{font-size:var(--fs-xs);letter-spacing:.22em;text-transform:uppercase;color:var(--lime);margin-bottom:6px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;letter-spacing:.04em;color:var(--white);line-height:1}
.modal-close{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,color .2s,border-color .2s}
.modal-close:hover{background:rgba(255,255,255,.12);color:var(--white);border-color:rgba(255,255,255,.15)}
.modal-body{padding:24px 26px 30px;display:flex;flex-direction:column;gap:16px}
.modal-hint{font-size:var(--fs-sm);color:var(--muted);font-style:italic}
.si{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(126,211,33,.2);border-radius:var(--radius-sm);padding:16px 18px;color:var(--text);font-family:'Barlow',sans-serif;font-size:var(--fs-xl);font-weight:600;outline:none;transition:border-color .2s,background .2s}
.si:focus{border-color:rgba(126,211,33,.55);background:rgba(126,211,33,.05)}
.si::placeholder{color:var(--muted);font-weight:400}
.modal-body .btn{margin-top:4px}

/* ── RESULT ── */
.result{padding:52px 24px;background:linear-gradient(180deg,var(--bg) 0%,#030805 100%);border-top:1px solid var(--border);position:relative;z-index:1}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.result-hd{text-align:center;margin-bottom:32px}
.result-hd.reveal{animation:fadeUp .45s var(--ease-out) .18s both}
.result-btns.reveal{animation:fadeUp .4s var(--ease-out) .35s both}
.result-hd h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.2rem,6vw,3rem);letter-spacing:.12em;color:var(--gold);background:linear-gradient(90deg,var(--gold),var(--lime));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.result-hd p{font-size:var(--fs-sm);color:var(--muted);margin-top:8px;letter-spacing:.04em}

/* ── CARD ── */
@keyframes cardReveal{from{opacity:0;transform:translateY(20px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.card{max-width:680px;margin:0 auto;background:linear-gradient(155deg,#0c1a10 0%,#071009 40%,#10180c 100%);border:1px solid rgba(126,211,33,.25);border-radius:var(--radius-lg);padding:0;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,200,83,.08),0 32px 64px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05)}
.card.reveal{animation:cardReveal .5s var(--ease-out) both}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--lime),var(--gold),var(--lime),transparent)}
.card::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(126,211,33,.05),transparent 60%);pointer-events:none}
.card-header{padding:24px 26px 18px;background:linear-gradient(180deg,rgba(126,211,33,.06) 0%,transparent 100%);border-bottom:1px solid rgba(255,255,255,.06);position:relative;z-index:1;display:flex;align-items:flex-start}
.card-header-left{flex:1;min-width:0}
.card-badge{display:inline-flex;align-items:center;gap:6px;font-size:var(--fs-xs);letter-spacing:.2em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(245,200,66,.25);padding:4px 12px;border-radius:99px;margin-bottom:10px;background:rgba(245,200,66,.06)}
.card-name{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;line-height:1;letter-spacing:.06em;color:var(--white)}
.card-sub{font-size:var(--fs-xs);color:var(--muted);margin-top:5px;letter-spacing:.12em;text-transform:uppercase}
.card-rows{display:grid;grid-template-columns:1fr 1fr;padding:10px 22px 14px;position:relative;z-index:1}
.cr{display:flex;align-items:center;gap:12px;padding:12px 12px 12px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.cr:nth-child(odd){border-right:1px solid rgba(255,255,255,.05);padding-right:16px}
.cr:nth-child(even){padding-left:16px}
.cr:nth-last-child(-n+2){border-bottom:none}
.cr-icon{font-size:1.4rem;flex-shrink:0;width:30px;text-align:center}
.cr-meta{flex:1;min-width:0}
.cr-label{font-size:.6rem;color:var(--lime);text-transform:uppercase;letter-spacing:.14em;line-height:1;margin-bottom:2px}
.cr-player{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.04em;line-height:1.05;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-foot{display:flex;justify-content:space-between;align-items:center;padding:14px 26px;border-top:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.15);position:relative;z-index:1}
.card-hash{font-size:var(--fs-sm);color:var(--lime);letter-spacing:.06em;font-weight:700}
.card-site{font-size:var(--fs-xs);color:var(--muted)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:15px 24px;border-radius:var(--radius-sm);border:none;font-family:'Barlow',sans-serif;font-size:var(--fs-md);font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:transform .2s,box-shadow .2s,opacity .2s;width:100%;touch-action:manipulation}
.btn-gold{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#060f08}
.btn-gold:hover,.btn-gold:active{transform:translateY(-2px);box-shadow:0 8px 24px rgba(245,200,66,.28)}
.btn-gold:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--lime);color:var(--lime)}
.btn-green{background:linear-gradient(135deg,var(--emerald),var(--lime));color:#060f08}
.btn-green:hover,.btn-green:active{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,200,83,.28)}
.btn-muted{background:rgba(255,255,255,.04);color:var(--muted);border:1px solid var(--border)}
.btn-muted:hover{color:#ff5252;border-color:rgba(255,82,82,.3)}
.result-btns{display:flex;gap:12px;justify-content:center;margin-top:28px;flex-wrap:wrap;max-width:480px;margin-left:auto;margin-right:auto}
.result-btns .btn{width:auto;flex:1;min-width:120px}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--green);color:#060f08;font-size:var(--fs-sm);font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:10px 20px;border-radius:8px;z-index:400;opacity:0;transition:opacity .28s,transform .28s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(6,15,8,.2);border-top-color:#060f08;border-radius:50%;animation:rot .5s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

/* ── RESPONSIVE ── */

/* MOBILE : silhouette en haut, attributs en bas */
@media(max-width:779px){
  .lang-switcher{position:static;justify-content:center;padding:10px 16px 0;flex-wrap:wrap}
  .hs-btn{backdrop-filter:none}

  .wrap{flex-direction:column}

  .silhouette-area{
    padding:16px 8px 16px;
    display:grid;
    grid-template-columns:1fr auto 1fr;
    grid-template-rows:auto;
    align-items:start;
    gap:0;
    position:relative;
    overflow:visible;
  }

  .player-stage{
    grid-column:2;
    grid-row:1;
    width:110px;
    height:540px;
    flex-shrink:0;
    position:relative;
  }

  #hsContainer{ display:none }

  .hs-col-left, .hs-col-right{
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-self:stretch;
    padding-top:4px;
    padding-bottom:4px;
    min-height:540px;
  }
  .hs-col-left{ grid-column:1; grid-row:1; align-items:flex-end; padding-right:5px; }
  .hs-col-right{ grid-column:3; grid-row:1; align-items:flex-start; padding-left:5px; }

  .hs-mob{
    display:flex;
    flex-direction:column;
    align-items:center;
    cursor:pointer;
    touch-action:manipulation;
    gap:2px;
  }
  .hs-mob-btn{
    width:32px; height:32px;
    border-radius:50%;
    background:rgba(6,16,8,.92);
    border:1.5px solid rgba(126,211,33,.35);
    display:flex; align-items:center; justify-content:center;
    font-size:1rem;
    box-shadow:0 2px 8px rgba(0,0,0,.5);
    transition:border-color .15s,background .15s,box-shadow .15s;
  }
  .hs-mob:active .hs-mob-btn{border-color:var(--lime);background:rgba(126,211,33,.2);box-shadow:0 0 12px rgba(126,211,33,.3);}
  .hs-mob.sel .hs-mob-btn{ border-color:var(--lime); background:rgba(126,211,33,.16); box-shadow:0 0 14px rgba(126,211,33,.35); }
  .hs-mob-label{
    font-size:.65rem; letter-spacing:.03em; text-transform:uppercase;
    color:var(--muted); white-space:nowrap; text-align:center;
    background:rgba(6,16,8,.85); padding:1px 4px; border-radius:3px; max-width:80px;
    overflow:hidden; text-overflow:ellipsis; line-height:1.15;
  }
  .hs-mob.sel .hs-mob-label{ color:var(--lime); }
  .hs-mob-name{
    font-size:.68rem; font-weight:700; color:var(--gold); white-space:nowrap;
    background:rgba(6,16,8,.85); padding:1px 4px; border-radius:3px;
    max-width:80px; overflow:hidden; text-overflow:ellipsis; text-align:center; line-height:1.15;
  }

  .panel{width:100%;flex:1}
  .attr-scroll{max-height:none;overflow-y:visible}
}

/* DESKTOP */
@media(min-width:780px){
  .wrap{flex-direction:row;align-items:stretch}
  .silhouette-area{flex:1;border-right:1px solid var(--border);padding:28px 24px;justify-content:center;display:flex;flex-direction:column;align-items:center}
  .player-stage{width:270px;height:550px}
  .panel{flex:1;width:auto}
  .attr-scroll{max-height:none}
  :root{--fs-xs:.75rem;--fs-sm:.9rem;--fs-md:1rem;--fs-xl:1.2rem;--fs-2xl:1.5rem}
  .hd-tag{font-size:.65rem}
  .modal-title{font-size:2.8rem}

function detectLang() {
  try {
    const saved = localStorage.getItem('up_lang');
    if (saved && TRANSLATIONS[saved]) return saved;
  } catch(e) {}
  const nav = ((navigator.language || navigator.userLanguage) || 'en').toLowerCase();
  return LANG_MAP[nav] || LANG_MAP[nav.split('-')[0]] || 'en';
}

function remaining(r) {
  const map = {
    fr: r => r + ' attribut' + (r > 1 ? 's' : '') + ' restant' + (r > 1 ? 's' : ''),
    en: r => r + ' attribute' + (r > 1 ? 's' : '') + ' remaining',
    es: r => r + ' atributo' + (r > 1 ? 's' : '') + ' restante' + (r > 1 ? 's' : ''),
    de: r => r + ' Attribut' + (r > 1 ? 'e' : '') + ' übrig',
    it: r => r + (r > 1 ? ' attributi rimasti' : ' attributo rimasto'),
    pt: r => r + ' atributo' + (r > 1 ? 's' : '') + ' restante' + (r > 1 ? 's' : ''),
  };
  return (map[currentLang] || map.en)(r);
}

const HS_LEFT  = ['heading','physical','goalkeeper','dribbling','pace','weakfoot'];
const HS_RIGHT = ['passing','defending','skillmove','longshot','finishing'];

function renderMobileHotspots() {
  const stage = document.querySelector('.player-stage');
  if (!stage) return;
  const parent = stage.parentNode;

  let colLeft = document.getElementById('mobColLeft');
  let colRight = document.getElementById('mobColRight');
  if (colLeft)  colLeft.remove();
  if (colRight) colRight.remove();

  colLeft  = document.createElement('div');
  colLeft.id = 'mobColLeft'; colLeft.className = 'hs-col-left';
  parent.insertBefore(colLeft, stage);

  colRight = document.createElement('div');
  colRight.id = 'mobColRight'; colRight.className = 'hs-col-right';
  stage.insertAdjacentElement('afterend', colRight);

  function buildCol(container, ids) {
    container.innerHTML = '';
    ids.forEach(id => {
      const a = ATTRS.find(x => x.id === id);
      if (!a) return;
      const s   = sel[id];
      const div = document.createElement('div');
      div.className = 'hs-mob' + (s ? ' sel' : '');
      div.addEventListener('click', () => openModal(id));
      div.innerHTML =
        `<div class="hs-mob-btn">${a.icon}</div>` +
        `<div class="hs-mob-label">${escHtml(a.label)}</div>` +
        (s ? `<div class="hs-mob-name">${escHtml(s)}</div>` : '');
      container.appendChild(div);
    });
  }
  buildCol(colLeft,  HS_LEFT);
  buildCol(colRight, HS_RIGHT);
}

let _lastPct = -1;
function updateProgress() {
  const total = ATTRS.length;
  const done  = Object.keys(sel).length;
  const pct   = Math.round(done / total * 100);
  if (pct !== _lastPct) {
    _lastPct = pct;
    const progFill = $id('progFill');
    progFill.style.width = pct + '%';
    progFill.parentElement.setAttribute('aria-valuenow', pct);
    $id('progTxt').textContent  = pct + '%';
    $id('progTxt').style.color = pct === 100 ? 'var(--green)' : 'var(--lime)';
  }
  $id('panelSub').textContent = done === total ? T.allDone : remaining(total - done);
  // Update silhouette glow
  updateSilhouetteGlow(done, total);
}

// ── SILHOUETTE PROGRESSIVE GLOW ──
// Maps each attribute to the SVG body parts it lights up
const ATTR_BODY_PARTS = {
  heading:    ['head'],
  passing:    ['arm-l','hand-l','arm-r','hand-r'],
  physical:   ['torso','neck'],
  goalkeeper: ['hand-l','hand-r','arm-l','arm-r'],
  defending:  ['thigh-l','thigh-r','shin-l','shin-r'],
  dribbling:  ['foot-l','foot-r'],
  skillmove:  ['foot-l','foot-r','shin-l','shin-r'],
  longshot:   ['thigh-l','thigh-r','foot-l','foot-r'],
  pace:       ['thigh-l','thigh-r','shin-l','shin-r','foot-l','foot-r'],
  finishing:  ['foot-l','foot-r','shin-l','shin-r'],
  weakfoot:   ['foot-l','foot-r'],
};

function updateSilhouetteGlow(done, total) {
  const stage = $id('playerStage');
  const ratio = done / total;
  let level = 'low';
  if (ratio > 0 && ratio < 0.5)  level = 'mid';
  else if (ratio >= 0.5 && ratio < 1) level = 'high';
  else if (ratio >= 1) level = 'done';
  stage.dataset.progress = level;

  // Collect all lit parts
  const litParts = new Set();
  for (const attrId of Object.keys(sel)) {
    const parts = ATTR_BODY_PARTS[attrId];
    if (parts) parts.forEach(p => litParts.add(p));
  }
  // Update each SVG part
  document.querySelectorAll('#silBody [data-part]').forEach(el => {
    const part = el.dataset.part;
    if (litParts.has(part)) {
      el.setAttribute('stroke', 'url(#silGradLit)');
      el.setAttribute('fill', 'url(#silGradFillLit)');
      if (el.hasAttribute('filter')) el.setAttribute('filter', 'url(#silGlowLit)');
    } else {
      el.setAttribute('stroke', 'url(#silGrad)');
      el.setAttribute('fill', 'url(#silGradFill)');
      if (el.hasAttribute('filter')) el.setAttribute('filter', 'url(#silGlow)');
    }
  });
}

// ── RENDER CARD TO CANVAS (shared helper) ──
function renderCardCanvas() {
  return new Promise((resolve, reject) => {
    if (typeof html2canvas === 'undefined') { reject(new Error('html2canvas not loaded')); return; }
    const cardEl = $id('theCard');
    const clone  = cardEl.cloneNode(true);
    clone.style.position  = 'fixed';
    clone.style.left      = '-9999px';
    clone.style.top       = '0px';
    clone.style.width     = cardEl.offsetWidth + 'px';
    clone.style.margin    = '0';
    clone.style.opacity   = '1';
    clone.style.transform = 'none';
    clone.style.animation = 'none';

    function applyComputed(orig, cloneEl) {
      const cs = window.getComputedStyle(orig);
      cloneEl.style.color              = cs.color;
      cloneEl.style.background         = cs.background;
      cloneEl.style.backgroundColor    = cs.backgroundColor;
      cloneEl.style.borderColor        = cs.borderColor;
      cloneEl.style.borderTopColor     = cs.borderTopColor;
      cloneEl.style.fontFamily         = cs.fontFamily;
      cloneEl.style.fontSize           = cs.fontSize;
      cloneEl.style.fontWeight         = cs.fontWeight;
      cloneEl.style.letterSpacing      = cs.letterSpacing;
      cloneEl.style.textTransform      = cs.textTransform;
      cloneEl.style.lineHeight         = cs.lineHeight;
      cloneEl.style.padding            = cs.padding;
      cloneEl.style.animation          = 'none';
      cloneEl.style.transform          = 'none';
      cloneEl.style.opacity            = '1';
      cloneEl.style.webkitTextFillColor = 'unset';
      const origChildren  = orig.children;
      const cloneChildren = cloneEl.children;
      for (let i = 0; i < origChildren.length; i++) {
        if (cloneChildren[i]) applyComputed(origChildren[i], cloneChildren[i]);
      }
    }

    document.body.appendChild(clone);
    applyComputed(cardEl, clone);

    requestAnimationFrame(() => {
      html2canvas(clone, {
        backgroundColor: '#0c1a10',
        scale: 2,
        useCORS: true,
        allowTaint: true,
        logging: false,
        imageTimeout: 15000,
        removeContainer: true,
      })
        .then(canvas => {
          document.body.removeChild(clone);
          resolve(canvas);
        })
        .catch(err => {
          if (document.body.contains(clone)) document.body.removeChild(clone);
          reject(err);
        });
    });
  });
}

// ── DOWNLOAD ──
function dlCard() {
  const btn     = $id('btnDl');
  const origTxt = btn.textContent;
  btn.innerHTML = '<span class="spin"></span>';
  btn.disabled  = true;

  renderCardCanvas()
    .then(canvas => {
      const a = document.createElement('a');
      a.download = 'ultimate-player.png';
      a.href = canvas.toDataURL('image/png');
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      btn.textContent = origTxt; btn.disabled = false;
      showToast(T.toastSaved);
    })
    .catch(err => {
      console.error('html2canvas:', err);
      btn.textContent = origTxt; btn.disabled = false; showToast(T.toastErr);
    });
}

// ── SHARE (with image when possible) ──
function shareIt() {
  const lines = ATTRS.map(a => a.icon + ' ' + a.label + ': ' + (sel[a.id] || '\u2014')).join('\n');
  const text  = T.shareText + '\n' + lines + '\n\n#UltimatePlayer';

  // Try sharing with image file first
  if (navigator.canShare && typeof html2canvas !== 'undefined') {
    const btn = $id('btnShare');
    const origTxt = btn.textContent;
    btn.innerHTML = '<span class="spin"></span>';
    btn.disabled  = true;

    renderCardCanvas()
      .then(canvas => {
        return new Promise((resolve) => {
          canvas.toBlob(blob => resolve(blob), 'image/png');
        });
      })
      .then(blob => {
        if (!blob) throw new Error('No blob');
        const file = new File([blob], 'ultimate-player.png', { type: 'image/png' });
        const shareData = { title: 'Ultimate Player', text, files: [file] };
        if (navigator.canShare(shareData)) {
          return navigator.share(shareData);
        } else {
          // Fallback: share text only
          return navigator.share({ title: 'Ultimate Player', text });
        }
      })
      .then(() => {
        btn.textContent = origTxt; btn.disabled = false;
      })
      .catch(err => {
        btn.textContent = origTxt; btn.disabled = false;
        // If user cancelled, don't show error
        if (err.name !== 'AbortError') {
          // Fallback to clipboard
          _copyToClipboard(text);
        }
      });
  } else if (navigator.share) {
    navigator.share({ title:'Ultimate Player', text }).catch(() => {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text)
      .then(() => showToast(T.toastCopied))
      .catch(() => _copyFallback(text));
  } else {
    _copyFallback(text);
  }
}

function _copyToClipboard(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text)
      .then(() => showToast(T.toastCopied))
      .catch(() => _copyFallback(text));
  } else {
    _copyFallback(text);
  }
}

function _copyFallback(text) {
  try {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(T.toastCopied);
  } catch(e) { showToast(T.toastNoShare); }
}

// ── RESET ──
function resetAll() {
  clearTimeout(autoTimer);
  closeModal();
  sel = {}; curAttr = null; _lastPct = -1; _panelRendered = false;
  renderHotspots(); renderPanel(); updateProgress();
  $id('result').style.display = 'none';
  window.scrollTo({ top:0, behavior:'smooth' });
}

// ── TOAST ──
let toastTimer = null;
function showToast(msg) {
  clearTimeout(toastTimer);
  const t = $id('toast');
  t.innerHTML = msg;
  t.classList.add('show');
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

function openLegal(e) {
  e.preventDefault();
  $id('legalTitle').textContent = T.legalTitle;
  $id('legalBody').innerHTML = LEGAL_CONTENT[currentLang] || LEGAL_CONTENT.en;
  const ov = $id('legalOverlay');
  ov.classList.add('open');
  ov.setAttribute('aria-hidden', 'false');
}

function closeLegal() {
  const ov = $id('legalOverlay');
  ov.classList.remove('open');
  ov.setAttribute('aria-hidden', 'true');
}

function closeLegalOut(e) {
  if (e.target === e.currentTarget) closeLegal();
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  document.documentElement.lang = currentLang;
  updateMetaSEO(currentLang);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
  applyLang();
  renderHotspots();
  renderPanel();
  updateProgress();
});

// Keyboard: modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if ($id('legalOverlay').classList.contains('open')) { closeLegal(); return; }
    if ($id('overlay').classList.contains('open')) { closeModal(); return; }
  }
  const ov = $id('overlay');
  if (!ov.classList.contains('open')) return;
  if (e.key === 'Enter') { e.preventDefault(); confirmManual(); }
});

// Prevent double-tap zoom on mobile
document.addEventListener('dblclick', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  e.preventDefault();
}, { passive: false });
</script>
